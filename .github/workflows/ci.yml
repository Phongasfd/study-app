name: Backend CI

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

jobs:
  backend:
    name: Backend (Maven)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: studyapp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test -d studyapp_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      mongodb:
        image: mongo:8.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run backend tests
        working-directory: backend
        run: mvn -B -ntp verify

 