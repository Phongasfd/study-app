services:
  postgres:
    image: postgres:16
    container_name: studyapp_postgres_dev
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data 
      # postgres_data: docker volumes 
      # /var/lib/postgresql/data: postgres data folder in container

volumes:
  postgres_data: