# ==========================================
# Redirect all HTTP traffic to HTTPS
# ==========================================
server {

    # Listen on port 80 (HTTP)
    listen 80;

    # Match all hostnames
    server_name _;

    # Redirect every request to HTTPS
    return 301 https://$host$request_uri;
}


# ==========================================
# Main HTTPS Server
# ==========================================
server {

    # Listen on port 443 with SSL enabled
    listen 443 ssl;

    # Domain name
    server_name _;

    # SSL certificate
    ssl_certificate /etc/letsencrypt/live/your-domain/fullchain.pem;

    # SSL private key
    ssl_certificate_key /etc/letsencrypt/live/your-domain/privkey.pem;

    # ==========================================
    # Security
    # ==========================================

    # Hide nginx version from response headers
    server_tokens off;

    # Limit upload size (file upload)
    client_max_body_size 20M;

    # Prevent clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Better referrer privacy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;


    # ==========================================
    # Frontend (React / Vite)
    # ==========================================
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }


    # ==========================================
    # Backend REST API
    # ==========================================
    location /api/ {

        # Forward API requests to Spring Boot
        proxy_pass http://backend:8080/;

        proxy_http_version 1.1;

        # Preserve request information
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Connection timeout
        proxy_connect_timeout 60s;

        # Send timeout
        proxy_send_timeout 60s;

        # Read timeout
        proxy_read_timeout 60s;
    }


    # ==========================================
    # WebSocket
    # ==========================================
    location /ws/ {

        # Forward websocket traffic
        proxy_pass http://backend:8080/ws/;

        proxy_http_version 1.1;

        # Upgrade HTTP → WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep websocket connection alive
        proxy_read_timeout 86400;
    }
}