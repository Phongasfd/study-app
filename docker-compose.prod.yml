
services:
  postgres:
   image: postgres:16
   restart: always
   environment:
     POSTGRES_USER: ${POSTGRES_USER}
     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
     POSTGRES_DB: ${POSTGRES_DB}
   volumes:
     - postgres_data:/var/lib/postgresql/data
     
  mongodb:
   image: mongo:8.0
   restart: always
   environment:
     MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
     MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
   volumes:
     - mongodb_data:/data/db

  backend:
    image: namphong134/study-app-backend:latest
    restart: always
    environment:
      # Provide production DB connection strings via environment or .env on the host
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      MONGO_URI: ${MONGO_URI}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      RATE_LIMIT_REQUESTS: 100
      RATE_LIMIT_DURATION: 60

    ports:
      - "8080:8080"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
  
  frontend:
    image: namphong134/study-app-frontend:latest
    restart: always
    environment:
      - VITE_API_BASE_URL: ${VITE_API_BASE_URL}

  nginx:
    image: nginx:alpine
    container_name: gym_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro # Mount the custom nginx configuration
      - /etc/ssl/certs/study.crt:/etc/ssl/certs/study.crt:ro # Mount the SSL certificate
      - /etc/ssl/private/study.key:/etc/ssl/private/study.key:ro
    depends_on: # Ensure nginx starts after the backend and frontend services
      - backend
      - frontend

# Optional: if you want the compose file to also start DBs (not recommended for real production),
# uncomment and configure the following services and point the backend to use them.

volumes:
  postgres_data:
  mongodb_data:
